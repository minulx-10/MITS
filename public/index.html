<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITS · 대시보드</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">⛏ MITS <span class="brand-sub">Minecraft 관리 패널</span></div>
    <div class="sysbar" id="sysbar"></div>
    <span class="role-badge" id="roleBadge"></span>
    <button class="ghost" id="logout">로그아웃</button>
  </header>

  <div class="serverbar">
    <span class="serverbar-label">서버 선택</span>
    <div class="seg" id="serverSwitch"></div>
  </div>

  <nav class="tabs-nav" id="tabsNav"></nav>

  <main class="wrap">
    <div id="view"><!-- 탭 내용 --></div>
  </main>

  <div class="toast" id="toast"></div>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">확인</h3>
      <p id="modalText"></p>
      <input id="modalInput" class="modal-input" style="display:none" />
      <div class="modal-actions">
        <button class="ghost" id="modalCancel">취소</button>
        <button class="danger" id="modalOk">실행</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
