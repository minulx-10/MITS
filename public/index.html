<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MITS · 대시보드</title>
  <meta name="description" content="MITS — Minecraft(PaperMC) 서버 관리 패널" />
  <meta name="theme-color" content="#0c1410" />
  <link rel="stylesheet" href="/style.css" />
  <!-- PWA: 홈 화면 추가(앱처럼) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MITS" />
</head>
<body>
  <header class="topbar">
    <div class="brand">⛏ MITS <span class="brand-sub">Minecraft 관리 패널</span></div>
    <div class="sysbar" id="sysbar"></div>
    <span class="role-badge" id="roleBadge"></span>
    <button class="ghost" id="logout">로그아웃</button>
  </header>

  <div class="serverbar">
    <span class="serverbar-label">서버 선택</span>
    <div class="seg" id="serverSwitch"></div>
  </div>

  <nav class="tabs-nav" id="tabsNav"></nav>

  <main class="wrap">
    <div id="view"><!-- 탭 내용 --></div>
  </main>

  <div class="toast" id="toast"></div>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalTitle">확인</h3>
      <p id="modalText"></p>
      <input id="modalInput" class="modal-input" style="display:none" />
      <div class="modal-actions">
        <button class="ghost" id="modalCancel">취소</button>
        <button class="danger" id="modalOk">실행</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script>
    // PWA 서비스워커 — HTTPS(tailscale serve) 또는 localhost 에서만 등록됨(그 외엔 조용히 실패)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
