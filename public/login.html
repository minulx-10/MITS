<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MITS · 로그인</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: system-ui, "Segoe UI", "Malgun Gothic", sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1d3b27, #0c1410 60%);
      color: #e6efe9;
    }
    .card {
      width: min(92vw, 360px); padding: 32px 28px; border-radius: 16px;
      background: #15201a; border: 1px solid #2f4a3a;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    .logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; color: #6fdc8c; text-align: center; }
    .sub { text-align: center; color: #8aa395; font-size: 13px; margin: 6px 0 24px; }
    label { display:block; font-size: 13px; color:#a9c2b4; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 14px; border-radius: 10px; font-size: 15px;
      background: #0e1713; border: 1px solid #2f4a3a; color: #e6efe9; outline: none;
    }
    input:focus { border-color: #6fdc8c; }
    button {
      margin-top: 18px; width: 100%; padding: 12px; border: 0; border-radius: 10px;
      background: #2fae5e; color: #07120b; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    button:hover { background: #38c46c; }
    .err { margin-top: 14px; min-height: 18px; color: #ff8b8b; font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">⛏ MITS</div>
    <div class="sub">Minecraft 서버 관리 패널</div>
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus />
    <button type="submit">로그인</button>
    <div class="err" id="err"></div>
  </form>
  <script>
    const form = document.getElementById('form');
    const err = document.getElementById('err');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      const password = document.getElementById('pw').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (data.ok) { location.href = '/'; }
        else { err.textContent = data.error || '로그인 실패'; }
      } catch (_) {
        err.textContent = '서버에 연결할 수 없습니다.';
      }
    });
  </script>
</body>
</html>
